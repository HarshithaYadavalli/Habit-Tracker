services:
  - type: web
    name: habit-tracker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_PATH
        value: /var/data/habits.db
    disk:
      name: habit-data
      mountPath: /var/data
      sizeGB: 1
